name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Automated Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services and run pytest
        run: |
          # Copy default env configuration for Docker Compose variables
          cp .env.example .env
          # Boot up services via dev compose
          docker compose up --build -d db backend
          
          # Wait for PostgreSQL container health check to succeed
          echo "Waiting for database to be ready..."
          until [ "$(docker inspect -f '{{.State.Health.Status}}' $(docker compose ps -q db))" = "healthy" ]; do
            sleep 1
          done
          
          # Execute test suite inside the backend container
          docker compose exec -T backend sh -c "env PYTHONPATH=. pytest backend/tests/ -v"
          
          # Tear down test services
          docker compose down -v

  build-and-push:
    name: Build & Push to Docker Hub
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch build if needed)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME }}/fitness-os
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger-deploy:
    name: Trigger n8n Deployment Webhook
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Send POST request to n8n
        run: |
          curl -f -X POST "${{ secrets.N8N_WEBHOOK_URL }}" \
            -H "X-Webhook-Secret: ${{ secrets.N8N_WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"image": "${{ secrets.DOCKER_HUB_USERNAME }}/fitness-os:latest", "sha": "${{ github.sha }}"}'
