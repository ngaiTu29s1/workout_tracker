name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile'
      - 'docker-compose*'
      - '.github/workflows/deploy.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run Automated Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      POSTGRES_USER: fitness
      POSTGRES_PASSWORD: test_db_password_123
      POSTGRES_DB: fitness_os
      N8N_WEBHOOK_URL: http://n8n.local:5678/webhooks/enrich
      N8N_AUTOFILL_WEBHOOK_URL: http://n8n.local:5678/webhooks/autofill
      APP_PORT: 8000
      API_SECRET_KEY: change_me_api_key_fitness_os_123
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services and run pytest
        run: |
          # Boot up services via dev compose
          docker compose up --build -d fitness-db fitness-backend
          
          # Wait for PostgreSQL container health check to succeed (max 30s)
          echo "Waiting for database to be ready..."
          TIMEOUT=30
          while [ "$TIMEOUT" -gt 0 ]; do
            STATUS=$(docker inspect -f '{{.State.Health.Status}}' $(docker compose ps -q fitness-db) 2>/dev/null || echo "unhealthy")
            if [ "$STATUS" = "healthy" ]; then
              break
            fi
            sleep 1
            TIMEOUT=$((TIMEOUT - 1))
          done
          if [ "$TIMEOUT" -eq 0 ]; then
            echo "Database failed to become ready in time"
            exit 1
          fi
          
          # Execute test suite inside the backend container
          docker compose exec -T fitness-backend sh -c "env PYTHONPATH=. pytest backend/tests/ -v"
          
          # Tear down test services
          docker compose down -v

  build-and-push:
    name: Build & Push to Docker Hub
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU (for multi-arch build if needed)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        env:
          DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
        run: |
          CLEAN_USER=$(echo "$DOCKER_HUB_USERNAME" | tr -d '\r' | tr -d ' ' | tr -d '\n')
          CLEAN_TOKEN=$(echo "$DOCKER_HUB_TOKEN" | tr -d '\r' | tr -d ' ' | tr -d '\n')
          echo "$CLEAN_TOKEN" | docker login -u "$CLEAN_USER" --password-stdin

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_HUB_USERNAME }}/fitness-os
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger-deploy:
    name: Trigger n8n Deployment Webhook
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send POST request to n8n
        run: |
          curl -f -X POST "${{ secrets.N8N_WEBHOOK_URL_DEPLOY }}" \
            -H "X-Webhook-Secret: ${{ secrets.N8N_WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"image": "${{ secrets.DOCKER_HUB_USERNAME }}/fitness-os:latest", "sha": "${{ github.sha }}"}'
