services:
  fitness-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ports:
    #   # Bind to localhost so it's not exposed publicly, but accessible locally or via SSH tunnel
    #   - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  fitness-backend:
    # Uses the pre-built Docker image pushed to Docker Hub by GitHub Actions
    image: ${DOCKER_IMAGE}
    restart: unless-stopped
    # ports:
    #   # Exposes port 8000 on the host. Traffic will be reachable securely 
    #   # from any device in your Tailnet via http://<server-tailscale-ip>:8000
    #   - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@fitness-db:5432/${POSTGRES_DB}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL}
      N8N_AUTOFILL_WEBHOOK_URL: ${N8N_AUTOFILL_WEBHOOK_URL}
      FITNESS_OS_API_KEY: ${FITNESS_OS_API_KEY}
      POOL_DATA_PATH: /app/static/pool
    depends_on:
      fitness-db:
        condition: service_healthy
    volumes:
      # Only mount the persistent pool data (enrichment cache, pool images/gifs)
      # No local backend/frontend directory mounts in production
      - ./data/exercise-pool:/app/static/pool
    command: sh -c "alembic -c backend/alembic.ini upgrade head && uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --workers 4"

volumes:
  postgres_data:

networks:
  default:
    name: fitness_net


