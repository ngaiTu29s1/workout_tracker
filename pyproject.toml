# Project tooling config. Backend runtime deps live in backend/requirements.txt.
# pytest config lives in backend/pytest.ini (untouched) to avoid rootdir clashes.
[tool.ruff]
line-length = 120
target-version = "py312"
extend-exclude = ["data", "frontend", ".handoffs", ".qwen"]

[tool.ruff.lint]
# Conservative starter rule set; expand as the codebase is cleaned up.
select = ["E", "F", "W", "I", "B", "SIM"]
ignore = [
    "E501",  # line length handled by the formatter; legacy long lines out of scope
]

[tool.ruff.lint.per-file-ignores]
"backend/migrations/*" = ["E402", "F401"]  # Alembic env is import-heavy by design
"backend/tests/*" = ["F401", "F841"]        # fixtures/unused-by-design helpers

[tool.ruff.format]
line-ending = "lf"
docstring-code-format = true
