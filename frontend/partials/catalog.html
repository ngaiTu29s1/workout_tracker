<section x-show="activeView === 'catalog'" class="view-enter">
    <div class="catalog-header">
        <div class="flex justify-between align-center">
            <h1>Exercise Catalog</h1>
            <div class="flex gap-sm flex-wrap">
                <button class="btn btn-secondary" style="min-height: 40px; padding: 0 var(--space-md); display: flex; align-items: center; gap: 4px;" @click="$store.exercises.enrichAll()" :disabled="$store.exercises.loading">
                    <span>🪄 AI Auto-fill & Enrich</span>
                </button>
                <button class="btn btn-secondary" style="min-height: 40px; padding: 0 var(--space-md);" @click="$store.exercises.openCreateModal()">
                    <span>Create Manual</span>
                </button>
                <button class="btn btn-primary" style="min-height: 40px; padding: 0 var(--space-md);" @click="$store.pool.open()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <span>Browse Pool</span>
                </button>
            </div>
        </div>
        
        <!-- Search Input -->
        <div class="search-wrapper">
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" class="form-control search-input" placeholder="Search exercises by name or muscle..." x-model="$store.exercises.search">
        </div>

        <!-- Tag Filters (Horizontal scroll) -->
        <div class="filter-row">
            <span class="chip" :class="!$store.exercises.selectedTag ? 'chip--active' : ''" @click="$store.exercises.selectedTag = ''; $store.exercises.selectedMuscle = '';">All</span>
            
            <template x-for="tag in $store.exercises.activeTags" :key="tag.value">
                <span class="chip" 
                      :class="$store.exercises.selectedTag === tag.value ? 'chip--active chip--' + tag.value.replace('_', '-') : ''" 
                      @click="$store.exercises.selectedTag = ($store.exercises.selectedTag === tag.value ? '' : tag.value)" 
                      x-text="tag.label"></span>
            </template>
        </div>
    </div>

    <!-- Exercise Cards Grid -->
    <div x-show="$store.exercises.loading" class="text-center mt-lg">
        <div class="spinner"></div>
        <p class="text-secondary mt-sm">Loading exercises...</p>
    </div>

    <div x-show="!$store.exercises.loading && $store.exercises.filteredItems.length === 0" class="text-center mt-lg card">
        <p class="text-secondary mb-md">No exercises found. Browse the exercise pool to get started!</p>
        <button class="btn btn-primary" style="margin: 0 auto;" @click="$store.pool.open()">Browse Exercise Pool</button>
    </div>

    <div class="exercise-grid" x-show="!$store.exercises.loading">
        <template x-for="ex in $store.exercises.filteredItems" :key="ex.id">
            <div class="exercise-card" 
                 @click="$store.exercises.openEditModal(ex)" 
                 x-data="{ imgFailed: false }"
                 :class="$store.exercises.enrichingIds.includes(ex.id) ? 'exercise-card--enriching' : ''">
                
                <!-- Loading overlay for enrichment -->
                <div x-show="$store.exercises.enrichingIds.includes(ex.id)" class="exercise-card__enrich-overlay">
                    <div class="spinner-small"></div>
                    <span class="exercise-card__enrich-text" x-text="lang === 'vi' ? 'Đang dịch...' : 'Translating...'"></span>
                </div>

                <div class="exercise-card__image">
                    <img x-show="!imgFailed && $store.pool.getImageUrl(ex)" 
                         :src="$store.pool.getImageUrl(ex)" 
                         :alt="ex.name_eng"
                         loading="lazy"
                         @error="imgFailed = true">
                    <div class="exercise-card__placeholder" x-show="imgFailed || !$store.pool.getImageUrl(ex)">
                        <span x-text="ex.name_eng?.charAt(0)?.toUpperCase()"></span>
                    </div>
                </div>
                
                <div class="exercise-card__info">
                    <div class="exercise-card__muscle" x-text="ex.primary_muscle || 'General'"></div>
                    <h4 class="exercise-card__name" x-text="lang === 'vi' ? (ex.name_vie || ex.name_eng) : ex.name_eng"></h4>
                    <div class="exercise-card__vietnamese" x-text="lang === 'vi' ? ex.name_eng : (ex.name_vie || '')"></div>
                    
                    <div class="exercise-card__tags">
                        <template x-for="tag in (ex.tags || []).slice(0, 3)">
                             <span class="badge" :class="getRoutineTagClass(tag)" x-text="tag"></span>
                        </template>
                    </div>
                </div>
            </div>
        </template>
    </div>
</section>
