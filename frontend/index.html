<!DOCTYPE html>
<html lang="en" x-data="app" x-cloak>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness OS - Premium Workout Tracker</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <!-- CSS Design System -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/views.css">

    <!-- Polyfill to prevent closest() crashes in third-party libraries (e.g. Chart.js when event target is Document/Window) -->
    <script>
        if (typeof Document !== 'undefined' && !Document.prototype.closest) {
            Document.prototype.closest = function() { return null; };
        }
        if (typeof Window !== 'undefined' && !Window.prototype.closest) {
            Window.prototype.closest = function() { return null; };
        }
    </script>

    <!-- CDN Libraries & Core Modules -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    
    <!-- Core JS Application (registers stores and dynamically loads Alpine.js) -->
    <script type="module" src="js/app.js?v=5"></script>
    <script type="module" src="js/stores/pool-store.js?v=5"></script>
</head>
<body>

    <div class="app-container">
        
        <!-- Navigation Menu (Bottom on mobile, Sidebar on desktop) -->
        <nav class="nav-menu">
            <!-- Catalog Tab -->
            <a href="#catalog" class="nav-item" :class="activeView === 'catalog' ? 'nav-item--active' : ''">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                </svg>
                <span>Catalog</span>
            </a>
            
            <!-- Calendar Tab -->
            <a href="#calendar" class="nav-item" :class="activeView === 'calendar' ? 'nav-item--active' : ''">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V10h14v10zm0-12H5V6h14v2z"/>
                </svg>
                <span>Calendar</span>
            </a>
            
            <!-- Session Tab -->
            <a href="#session" class="nav-item" :class="activeView === 'session' ? 'nav-item--active' : ''">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14 4.14 5.57 2 7.71 3.43 9.14 2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43-1.43-1.43 2.14-2.28z"/>
                </svg>
                <span>Session</span>
            </a>
            
            <!-- Stats Tab -->
            <a href="#stats" class="nav-item" :class="activeView === 'stats' ? 'nav-item--active' : ''">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/>
                </svg>
                <span>Stats</span>
            </a>

            <!-- Desktop Language Toggle -->
            <div class="nav-item lang-toggle-sidebar" style="margin-top: auto; cursor: pointer; display: flex; align-items: center; gap: var(--space-md);" @click="toggleLang()">
                <span style="font-size: 20px;" x-text="lang === 'vi' ? '🇻🇳' : '🇬🇧'"></span>
                <span x-text="lang === 'vi' ? 'Tiếng Việt' : 'English'"></span>
            </div>

            <!-- Version Indicator -->
            <span class="nav-version" @click="copyVersion()" x-text="'v' + appVersion + (appCommit ? ' · ' + appCommit : '')" x-show="appVersion"></span>
        </nav>

        <!-- Main Content Area -->
        <main class="main-content">
            
            <!-- Mobile Header -->
            <header class="app-header">
                <div class="app-logo">🏋️ Fitness OS</div>
                <div class="flex align-center gap-sm">
                    <!-- Language Toggle Button Mobile -->
                    <button @click="toggleLang()" class="btn btn-secondary" style="min-height: auto; height: 32px; padding: 0 var(--space-sm); font-size: var(--font-xs); border: 1px solid var(--border-glass);">
                        <span x-text="lang === 'vi' ? '🇻🇳 VI' : '🇬🇧 EN'"></span>
                    </button>
                    <h2 x-text="activeView.charAt(0).toUpperCase() + activeView.slice(1)" style="font-size: var(--font-base); text-transform: uppercase; color: var(--text-secondary); letter-spacing: 0.05em; margin: 0;"></h2>
                </div>
            </header>

            <!-- ==========================================================================
               VIEW: EXERCISE CATALOG
               ========================================================================== -->
            <div id="partial-catalog"></div>
            <!-- ==========================================================================
               VIEW: CALENDAR VIEW
               ========================================================================== -->
            <div id="partial-calendar"></div>


            <!-- ==========================================================================
               VIEW: WORKOUT SESSION TRACKER
               ========================================================================== -->
            <div id="partial-session"></div>


            <!-- ==========================================================================
               VIEW: STATISTICS DASHBOARD
               ========================================================================== -->
            <div id="partial-stats"></div>

        </main>

            <div id="partial-modals"></div>

        <!-- Global Toast Alerts Overlay -->
        <div class="toast-container">
            <template x-for="t in toasts" :key="t.id">
                <div class="toast" :class="'toast--' + t.type">
                    <span x-text="t.message"></span>
                    <button class="toast-close" @click="toasts = toasts.filter(item => item.id !== t.id)">✕</button>
                </div>
            </template>
        </div>

    </div>

</body>
</html>
